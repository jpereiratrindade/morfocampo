name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

      - name: Check Python syntax
        run: python3 -m py_compile web/server.py web/morfocampo_bridge.py web/db.py web/transcriber.py

      - name: Check deploy script syntax
        run: |
          bash -n run.sh
          bash -n deploy/install_morfonode.sh
          bash -n deploy/configure_mdns_alias.sh

      - name: Check whitespace
        run: git diff --check
